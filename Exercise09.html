<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Tập tạo form Tìm Kiếm và Lọc Sản Phẩm</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            margin: 50px;
            background-color: #fff;
        }
        .search-form {
            max-width: 600px;
        }
        .form-title {
            font-size: 32px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 25px;
            color: #000000;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #000000;
        }
        .form-input {
            width: 100%;
            max-width: 400px;
            padding: 8px 12px;
            font-size: 16px;
            border: 1px solid #767676;
            border-radius: 4px;
            outline: none;
            box-sizing: border-box;
        }
        .form-select {
            width: 100%;
            max-width: 180px;
            padding: 8px 12px;
            font-size: 16px;
            border: 1px solid #767676;
            border-radius: 4px;
            background-color: #ffffff;
            outline: none;
        }
        .btn-submit {
            padding: 6px 20px;
            font-size: 16px;
            color: #000000;
            background-color: #efefef;
            border: 1px solid #767676;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-submit:hover {
            background-color: #e5e5e5;
        }
    </style>
</head>
<body>
    <form class="search-form" action="" method="GET">
        <h1 class="form-title">Tìm Kiếm Sản Phẩm</h1>
        <div class="form-group">
            <label for="search-keyword" class="form-label">Từ khóa tìm kiếm:</label>
            <input type="text" id="search-keyword" name="keyword" class="form-input">
        </div>
        <div class="form-group">
            <label for="product-category" class="form-label">Loại sản phẩm:</label>
            <select id="product-category" name="category" class="form-select">
                <option value="dien-tu">Điện tử</option>
                <option value="thoi-trang">Thời trang</option>
                <option value="gia-dung">Gia dụng</option>
            </select>
        </div>
        <div class="form-group">
            <button type="submit" class="btn-submit">Tìm kiếm</button>
        </div>
    </form>
</body>
</html>
